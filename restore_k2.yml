---
- name: Restore R3men Graphite Bed Configs After Firmware Update
  hosts: k2_plus
  gather_facts: false
  vars:
    # Target directory path on stock Creality OS filesystem
    config_dir: "/usr/data/printer_data/config"

  tasks:
    - name: Check if R3men thermistor block is present
      ansible.builtin.lineinfile:
        path: "{{ config_dir }}/printer.cfg"
        line: "[thermistor R3men_bed]"
        state: present
      register: thermistor_check

    - name: Append R3men thermistor block right above heater_bed if missing
      ansible.builtin.lineinfile:
        path: "{{ config_dir }}/printer.cfg"
        insertbefore: '^\[heater_bed\]'
        line: |
          [thermistor R3men_bed]
          temperature1: 25
          resistance1: 100000
          temperature2: 97
          resistance2: 1385
          temperature3: 248
          resistance3: 165
        state: present
      when: thermistor_check.changed 

    - name: Update heater_bed sensor type to use custom curve
      ansible.builtin.replace:
        path: "{{ config_dir }}/printer.cfg"
        regexp: '(^\[heater_bed\]\n(?:.*\n)*?sensor_type:\s*).*'
        replace: '\1R3men_bed'

    - name: Enforce 110-120v power limitation constraint (max_power 0.8)
      ansible.builtin.lineinfile:
        path: "{{ config_dir }}/printer.cfg"
        line: "max_power: 0.8"
        insertafter: '^\[heater_bed\]'
        state: present

    - name: Automate Z_TILT_ADJUST immediately after Z homing
      ansible.builtin.lineinfile:
        path: "{{ config_dir }}/sensorless.cfg"
        line: "  Z_TILT_ADJUST"
        insertafter: '^\s*G28\s+Z'
        state: present

    - name: Download additional_settings.cfg from GitHub
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/TheIncompetentCraftsman/Creality_K2_Plus_1.1.4.11/main/additional_settings.cfg"
        dest: "{{ config_dir }}/additional_settings.cfg"
        mode: '0644'

    - name: Inject include line for additional_settings into printer.cfg
      ansible.builtin.lineinfile:
        path: "{{ config_dir }}/printer.cfg"
        line: "[include additional_settings.cfg]"
        insertafter: '^\[include motor_control.cfg\]'
        state: present

    - name: Inject Manual Z-Offset hook into START_PRINT macro
      ansible.builtin.replace:
        path: "{{ config_dir }}/gcode_macro.cfg"
        regexp: '(^\[gcode_macro START_PRINT\]\n(?:.*\n)*?\s+G28(?: Z)?\n)'
        replace: |
          \1
              # Injected by Ansible for custom Z-offset calibration
              manual_z_offset

    - name: Download additional_settings.cfg from GitHub
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/TheIncompetentCraftsman/Creality_K2_Plus_1.1.4.11/main/additional_settings.cfg"
        dest: "{{ config_dir }}/additional_settings.cfg"
        mode: '0644'

    - name: Inject my personal Z-offset into additional_settings
      ansible.builtin.replace:
        path: "{{ config_dir }}/additional_settings.cfg"
        regexp: 'SET_GCODE_OFFSET\s+Z=.*'
        replace: 'SET_GCODE_OFFSET Z={{ my_z_offset }}'

    - name: Cycle the Klipper service layer to parse config adjustments
      ansible.builtin.raw: "restart"
